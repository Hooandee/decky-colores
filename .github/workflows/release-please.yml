name: release-please

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          version: 10
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 20
          cache: pnpm

      - name: Build and package
        if: ${{ steps.release.outputs.release_created }}
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
          rm -f dist/*.map
          staging=$(mktemp -d)
          mkdir -p "$staging/Colores"
          cp -rL dist main.py plugin.json package.json README.md LICENSE py_modules assets "$staging/Colores"
          (cd "$staging" && zip -r "$GITHUB_WORKSPACE/Colores.zip" Colores)
          unzip -l "$GITHUB_WORKSPACE/Colores.zip"

      - name: Attach plugin zip to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" Colores.zip --clobber
