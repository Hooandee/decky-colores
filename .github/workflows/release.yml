name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build and stamp version from tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          export VERSION="${REF_NAME#v}"
          node -e "const f='package.json';const p=require('./'+f);p.version=process.env.VERSION;require('fs').writeFileSync(f, JSON.stringify(p,null,2)+'\n')"
          echo "Building Colores v${VERSION}"
          pnpm install --no-frozen-lockfile
          pnpm build
          rm -f dist/*.map

      - name: Package plugin
        run: |
          staging=$(mktemp -d)
          mkdir -p "$staging/Colores"
          cp -rL dist main.py plugin.json package.json README.md LICENSE py_modules assets "$staging/Colores"
          (cd "$staging" && zip -r "$OLDPWD/Colores.zip" Colores)
          unzip -l Colores.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Colores.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
